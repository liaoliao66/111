<!DOCTYPE html>

<head>

<title>武穴多式联运大屏 — 访问入口</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:'Source Han Sans SC','Microsoft YaHei',sans-serif;
  background:linear-gradient(165deg,#030712 0%,#0f1a35 50%,#080c1a 100%);
  color:#e2e8f0;padding:24px;
}
.card{
  width:min(520px,100%);padding:2.2rem 2rem;border-radius:14px;
  background:rgba(15,23,42,0.85);border:1px solid rgba(99,102,241,0.25);
  box-shadow:0 8px 32px rgba(0,0,0,0.35);
}
h1{font-size:1.35rem;font-weight:800;margin-bottom:0.35rem;
  background:linear-gradient(90deg,#a5b4fc,#67e8f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:0.85rem;color:#94a3b8;margin-bottom:1.6rem;line-height:1.5}
.links{display:flex;flex-direction:column;gap:0.75rem}
a{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.95rem 1.1rem;border-radius:10px;text-decoration:none;color:#f1f5f9;
  background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.2);
  transition:background 0.2s,border-color 0.2s,transform 0.15s;
}
a:hover{background:rgba(99,102,241,0.22);border-color:rgba(34,211,238,0.45);transform:translateY(-1px)}
a strong{font-size:1rem;font-weight:700}
a span.desc{font-size:0.8rem;color:#94a3b8;margin-top:0.15rem;display:block}
a .arrow{color:#22d3ee;font-size:1.1rem}
.footer{margin-top:1.4rem;font-size:0.75rem;color:#64748b;line-height:1.5}
</style>
</head>
<body>
<div class="card">
  <h1>武穴多式联运指挥运营中心</h1>
  <p class="sub">双屏可视化演示包 · 离线可运行（无需后端）</p>
  <nav class="links">
    <a href="screen2.html">
      <div><strong>细节展示屏</strong><span class="desc">运营专题 · 港区地图、运单、设备与安全</span></div>
      <span class="arrow">→</span>
    </a>

  <p class="footer">发布到 GitHub Pages 后，访问根地址即可打开本页，再进入各屏。本地也可直接双击本文件。</p>
